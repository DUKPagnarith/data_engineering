services:
  # ─── PostgreSQL ───
  postgres:
    image: postgres:15
    container_name: w2_postgres
    environment:
      POSTGRES_DB: stock_db
      POSTGRES_USER: stock_user
      POSTGRES_PASSWORD: stockpassword
    ports:
      - "5433:5432"
    volumes:
      - w2_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U stock_user -d stock_db" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── MySQL ───
  mysql:
    image: mysql:8.0
    container_name: w2_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: employee_db
      MYSQL_USER: employee_user
      MYSQL_PASSWORD: employeepassword
    ports:
      - "3307:3306"
    volumes:
      - w2_mysql_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin ───
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: w2_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Airflow (init – run once) ───
  airflow-init:
    image: apache/airflow:2.9.0
    container_name: w2_airflow_init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://stock_user:stockpassword@postgres:5432/stock_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: airflow
      _AIRFLOW_WWW_USER_PASSWORD: airflow
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate &&
        airflow users create \
          --username airflow \
          --firstname Air \
          --lastname Flow \
          --role Admin \
          --email admin@example.com \
          --password airflow || true
    volumes:
      - ./data:/opt/airflow/data
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Airflow Webserver ───
  airflow-webserver:
    image: apache/airflow:2.9.0
    container_name: w2_airflow_webserver
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://stock_user:stockpassword@postgres:5432/stock_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    ports:
      - "8081:8080"
    command: airflow webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Airflow Scheduler ───
  airflow-scheduler:
    image: apache/airflow:2.9.0
    container_name: w2_airflow_scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://stock_user:stockpassword@postgres:5432/stock_db
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: airflow scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── Streamlit Dashboard (Weather) ───
  streamlit:
    image: python:3.11-slim
    container_name: w2_streamlit
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
               streamlit run app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app:/app
    depends_on:
      postgres:
        condition: service_healthy

  # ─── Streamlit Dashboard (Employee) ───
  streamlit-employee:
    image: python:3.11-slim
    container_name: w2_streamlit_employee
    working_dir: /app
    command: >
      bash -c "pip install -r requirements.txt &&
               streamlit run employee_app.py --server.port=8503 --server.address=0.0.0.0"
    ports:
      - "8503:8503"
    volumes:
      - ./streamlit_app:/app
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  w2_pg_data:
  w2_mysql_data:
